services:
  db:
    image: postgres:16-alpine
    container_name: seatbooking-db
    environment:
      POSTGRES_DB: seat_booking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d seat_booking"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
    container_name: seatbooking-backend
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/seat_booking?sslmode=disable
      APP_PORT: "8080"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: seatbooking-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
